services:
  raven:
    environment:
      NUXT_DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY must be set}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SYNC_ADAPTER_MODE: ${SYNC_ADAPTER_MODE:-stub}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: raven-postgres
    environment:
      POSTGRES_DB: raven
      POSTGRES_USER: raven
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - raven_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raven -d raven"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  raven_pg_data:
