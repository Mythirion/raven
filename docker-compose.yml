services:
  raven:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raven
    ports:
      - "3000:3000"
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY must be set}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-}
      ALLOW_SELF_SIGNUP: ${ALLOW_SELF_SIGNUP:-}
      NUXT_SQLITE_PATH: ${SQLITE_PATH:-/data/app.db}
      SQLITE_PATH: ${SQLITE_PATH:-/data/app.db}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SYNC_ADAPTER_MODE: ${SYNC_ADAPTER_MODE:-stub}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-300}
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-5}
      AUTH_RATE_LIMIT_BLOCK_SECONDS: ${AUTH_RATE_LIMIT_BLOCK_SECONDS:-600}
    volumes:
      - raven_data:/data
    restart: unless-stopped

volumes:
  raven_data:
